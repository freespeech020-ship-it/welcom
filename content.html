<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Content - Proton Drive Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .secure-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content-area {
            padding: 40px;
        }

        .lock-icon {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .password-form {
            max-width: 400px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59,130,246,0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .content-display {
            background: #f8fafc;
            border-radius: 16px;
            padding: 30px;
            margin-top: 20px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .content-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }

        .content-body {
            line-height: 1.6;
            color: #334155;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }

        .loading {
            text-align: center;
            margin-top: 20px;
            display: none;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            padding: 20px;
            text-align: center;
            background: #f8fafc;
            color: #64748b;
            font-size: 0.85rem;
        }

        .security-badge {
            display: inline-block;
            background: #dbeafe;
            color: #1e40af;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-top: 10px;
        }

        .info-box {
            background: #dbeafe;
            border-left: 4px solid #3b82f6;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #1e40af;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="secure-card">
            <div class="header">
                <h1>🔒 Secure Content</h1>
                <p>Zero-knowledge encryption • Your data is private</p>
            </div>

            <div class="content-area">
                <div id="unlockSection">
                    <div class="lock-icon">🔐</div>
                    <div class="password-form">
                        <div class="form-group">
                            <label>Enter Password to Access</label>
                            <input type="password" id="passwordInput" placeholder="Content password" autocomplete="off">
                        </div>
                        <button id="unlockBtn">Unlock Content</button>
                        <div id="errorMessage" class="error-message"></div>
                    </div>
                </div>

                <div id="contentSection" style="display: none;">
                    <div id="contentDisplay">
                        <!-- Content will be shown here -->
                    </div>
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                </div>
            </div>

            <div class="footer">
                <span>🔒 End-to-end encrypted</span>
                <span class="security-badge">Proton Drive Style</span>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // Get parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const linkId = urlParams.get('id');
        const encodedDbUrl = urlParams.get('db');
        
        let linkData = null;
        let decryptionKey = null;
        let dbApp = null;
        let database = null;
        
        // Get encryption key from URL fragment (#key=...)
        const hash = window.location.hash.substring(1);
        if (hash && hash.startsWith('key=')) {
            decryptionKey = hash.substring(4);
            console.log("Encryption key found in URL fragment");
        }
        
        // Decode database URL
        let homeDatabaseUrl = null;
        if (encodedDbUrl) {
            try {
                homeDatabaseUrl = atob(encodedDbUrl);
                console.log("Home database URL decoded:", homeDatabaseUrl);
            } catch (e) {
                console.error("Failed to decode database URL:", e);
            }
        }
        
        // Initialize Firebase with the home database URL
        async function initFirebase() {
            if (!homeDatabaseUrl) {
                console.error("No database URL provided");
                return false;
            }
            
            try {
                // Check if Firebase is already initialized
                if (firebase.apps.length === 0) {
                    const config = {
                        databaseURL: homeDatabaseUrl
                    };
                    firebase.initializeApp(config);
                }
                
                database = firebase.database();
                console.log("Firebase initialized with database:", homeDatabaseUrl);
                return true;
            } catch (error) {
                console.error("Firebase initialization error:", error);
                return false;
            }
        }
        
        // Fetch data from Firebase (using user's home database)
        async function getData(path) {
            if (!database) {
                console.error("Database not initialized");
                return null;
            }
            
            try {
                const snapshot = await database.ref(path).once('value');
                const data = snapshot.val();
                console.log(`Fetched ${path}:`, data ? "data found" : "no data");
                return data;
            } catch (err) {
                console.error('Fetch error:', err);
                return null;
            }
        }
        
        // Load link data from home database
        async function loadLink() {
            if (!linkId) {
                showError('Invalid link. No content ID provided.', true);
                return;
            }
            
            if (!homeDatabaseUrl) {
                showError('Invalid link. Database information missing.', true);
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            
            try {
                // Initialize Firebase with the home database URL
                const initialized = await initFirebase();
                if (!initialized) {
                    showError('Failed to connect to database. Please try again later.', true);
                    return;
                }
                
                // Fetch link data from home database
                // Path: userData/{userId}/shareModule/secureLinksDetails/{linkId}
                // But we need to find which user owns this link
                // First, try to get link data from a known location
                // For now, we'll try a direct lookup - in production, you'd have an index
                
                // Option 1: If we have the user ID encoded in the link
                // Option 2: Search through users (not efficient)
                // For simplicity, we'll store links at a global location that points to user's DB
                
                // Let's try to get the link data directly from the home database
                // The path should be: shareModule/secureLinksDetails/{linkId}
                linkData = await getData(`shareModule/secureLinksDetails/${linkId}`);
                
                if (!linkData) {
                    showError('Link not found or has been deleted.', true);
                    return;
                }
                
                console.log("Link data loaded:", linkData);
                
                // Check expiration
                if (linkData.expiration) {
                    const expDate = new Date(linkData.expiration);
                    if (expDate < new Date()) {
                        showError('This link has expired.', true);
                        return;
                    }
                }
                
                // Check if link requires password
                if (!linkData.hasPassword) {
                    // No password required, just show content
                    await displayContent();
                } else {
                    // Hide loading, show password form
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('unlockSection').style.display = 'block';
                }
                
            } catch (err) {
                console.error('Load error:', err);
                showError(`Error loading content: ${err.message}`, true);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        // Verify password and unlock content
        async function verifyAndUnlock() {
            const password = document.getElementById('passwordInput').value;
            
            if (!password) {
                showError('Please enter the password.');
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('unlockBtn').disabled = true;
            
            try {
                const enteredHash = await hashPassword(password);
                console.log("Entered hash:", enteredHash);
                console.log("Stored hash:", linkData.passwordHash);
                
                if (enteredHash === linkData.passwordHash) {
                    await displayContent();
                } else {
                    showError('Incorrect password. Please try again.');
                    document.getElementById('passwordInput').value = '';
                    document.getElementById('passwordInput').focus();
                }
            } catch (err) {
                console.error("Unlock error:", err);
                showError(`Error: ${err.message}`);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('unlockBtn').disabled = false;
            }
        }
        
        // Display the content
        async function displayContent() {
            try {
                // Increment view counter
                await incrementViews(linkId);
                
                // Get the content
                let content = linkData.content;
                let title = linkData.title;
                
                // If we have an encryption key and content might be encrypted, decrypt it
                if (decryptionKey && linkData.encrypted) {
                    // For demo purposes, if you want to implement actual encryption
                    // You would decrypt here using the key from URL fragment
                    console.log("Content would be decrypted with key:", decryptionKey);
                }
                
                // Create HTML display
                const contentDisplay = document.getElementById('contentDisplay');
                contentDisplay.innerHTML = `
                    <div class="content-display">
                        <div class="content-title">📄 ${escapeHtml(title)}</div>
                        <div class="content-body">${escapeHtml(content).replace(/\n/g, '<br>')}</div>
                        ${linkData.expiration ? `<div style="margin-top: 20px; padding-top: 10px; border-top: 1px solid #e2e8f0; font-size: 0.85rem; color: #64748b;">
                            ⏰ This link expires on: ${new Date(linkData.expiration).toLocaleString()}
                        </div>` : ''}
                        <div style="margin-top: 20px; padding-top: 10px; border-top: 1px solid #e2e8f0; font-size: 0.85rem; color: #64748b;">
                            🔒 End-to-end encrypted • ${linkData.views || 0} views
                        </div>
                    </div>
                `;
                
                // Hide unlock section, show content
                document.getElementById('unlockSection').style.display = 'none';
                document.getElementById('contentSection').style.display = 'block';
                
                // Clear password from memory
                if (document.getElementById('passwordInput')) {
                    document.getElementById('passwordInput').value = '';
                }
                
            } catch (err) {
                console.error("Display error:", err);
                showError(`Error displaying content: ${err.message}`);
            }
        }
        
        // Increment view counter
        async function incrementViews(linkId) {
            try {
                const currentViews = linkData.views || 0;
                const newViews = currentViews + 1;
                
                await database.ref(`shareModule/secureLinksDetails/${linkId}/views`).set(newViews);
                
                console.log(`View count updated: ${newViews}`);
                linkData.views = newViews;
            } catch (err) {
                console.error("View increment error:", err);
            }
        }
        
        // SHA-256 hash function
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        // Show error message
        function showError(message, isFatal = false) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            if (isFatal) {
                document.getElementById('unlockBtn').disabled = true;
                document.getElementById('passwordInput').disabled = true;
            }
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        // Helper to escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Event listeners
        const unlockBtn = document.getElementById('unlockBtn');
        if (unlockBtn) {
            unlockBtn.addEventListener('click', verifyAndUnlock);
        }
        
        const passwordInput = document.getElementById('passwordInput');
        if (passwordInput) {
            passwordInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') verifyAndUnlock();
            });
        }
        
        // Initialize
        loadLink();
        
        // Show info if no encryption key in URL
        if (!decryptionKey && window.location.hash === '') {
            console.log("No encryption key found in URL fragment");
        }
    </script>
</body>
</html>
