<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Content - PriBox Share</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .secure-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #219EBC 0%, #8ECAE6 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content-area {
            padding: 40px;
        }

        .lock-icon {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .open-icon {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .password-form {
            max-width: 400px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #219EBC;
            box-shadow: 0 0 0 3px rgba(33, 158, 188, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #219EBC;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #1a7a94;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(33, 158, 188, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .content-display {
            background: #f8fafc;
            border-radius: 16px;
            padding: 30px;
            margin-top: 20px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .content-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }

        .content-body {
            line-height: 1.6;
            color: #334155;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: inherit;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }

        .loading {
            text-align: center;
            margin-top: 20px;
            display: none;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #219EBC;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            padding: 20px;
            text-align: center;
            background: #f8fafc;
            color: #64748b;
            font-size: 0.85rem;
            border-top: 1px solid #e2e8f0;
        }

        .security-badge {
            display: inline-block;
            background: #dbeafe;
            color: #1e40af;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-left: 10px;
        }

        .badge-open {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-password {
            background: #fef3c7;
            color: #92400e;
        }

        .info-box {
            background: #dbeafe;
            border-left: 4px solid #219EBC;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #1e40af;
        }

        .view-count {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #e2e8f0;
            font-size: 0.75rem;
            color: #64748b;
            text-align: center;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .button-group button {
            flex: 1;
        }

        .btn-secondary {
            background: #64748b;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            .secure-card {
                background: #1e293b;
            }
            .content-display {
                background: #0f172a;
            }
            .content-title {
                color: #f1f5f9;
                border-bottom-color: #334155;
            }
            .content-body {
                color: #cbd5e1;
            }
            label {
                color: #f1f5f9;
            }
            .footer {
                background: #0f172a;
                color: #94a3b8;
                border-top-color: #334155;
            }
            .info-box {
                background: #1e293b;
                color: #93c5fd;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="secure-card">
            <div class="header">
                <h1>🔒 PriBox Secure Content</h1>
                <p>Secure sharing made simple</p>
            </div>

            <div class="content-area">
                <div id="unlockSection">
                    <div id="openAccessMessage" style="display: none;">
                        <div class="open-icon">🔓</div>
                        <div class="info-box" style="text-align: center;">
                            This content is open access. Click the button below to view.
                        </div>
                        <button id="viewOpenContentBtn">View Content</button>
                    </div>
                    <div id="passwordAccessMessage" style="display: none;">
                        <div class="lock-icon">🔐</div>
                        <div class="password-form">
                            <div class="form-group">
                                <label>Enter Password to Access</label>
                                <input type="password" id="passwordInput" placeholder="Content password" autocomplete="off">
                            </div>
                            <button id="unlockBtn">Unlock Content</button>
                        </div>
                    </div>
                    <div id="errorMessage" class="error-message"></div>
                </div>

                <div id="contentSection" style="display: none;">
                    <div id="contentDisplay">
                        <!-- Content will be shown here -->
                    </div>
                    <div class="button-group">
                        <button id="backToUnlockBtn" class="btn-secondary">← Lock & Go Back</button>
                    </div>
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                </div>
            </div>

            <div class="footer">
                <span>🔒 Secure sharing</span>
                <span class="security-badge">Powered by PriBox</span>
            </div>
        </div>
    </div>

    <script>
        // Firebase configuration
        const DB_URL = "https://admin-efcf4-default-rtdb.europe-west1.firebasedatabase.app";
        
        // Get parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const linkId = urlParams.get('id');
        const encodedUser = urlParams.get('user');
        
        let linkData = null;
        let viewIncremented = false;
        
        // SHA-256 hash function
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        // Fetch data from Firebase
        async function getData(path) {
            try {
                const response = await fetch(`${DB_URL}/${path}.json`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                return data;
            } catch (err) {
                console.error('Fetch error:', err);
                return null;
            }
        }
        
        // Update view count in Firebase (only once per successful view)
        async function incrementViews() {
            if (viewIncremented) {
                console.log("View already counted for this session");
                return;
            }
            
            try {
                const currentViews = linkData.views || 0;
                const newViews = currentViews + 1;
                const path = `shareLinks/${encodedUser}/${linkId}/views`;
                
                const response = await fetch(`${DB_URL}/${path}.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newViews)
                });
                
                if (response.ok) {
                    linkData.views = newViews;
                    viewIncremented = true;
                    console.log(`View count updated: ${newViews}`);
                }
            } catch (err) {
                console.error("View increment error:", err);
            }
        }
        
        // Reset to unlock state
        function resetToUnlock() {
            document.getElementById('contentDisplay').innerHTML = '';
            document.getElementById('contentSection').style.display = 'none';
            document.getElementById('unlockSection').style.display = 'block';
            
            const passwordInput = document.getElementById('passwordInput');
            if (passwordInput) {
                passwordInput.value = '';
            }
            
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';
            
            // Show the appropriate access message based on link type
            if (linkData) {
                showAccessMessage();
            }
        }
        
        // Show the appropriate access message based on link type
        function showAccessMessage() {
            const openAccessDiv = document.getElementById('openAccessMessage');
            const passwordAccessDiv = document.getElementById('passwordAccessMessage');
            
            if (linkData.hasPassword) {
                openAccessDiv.style.display = 'none';
                passwordAccessDiv.style.display = 'block';
            } else {
                openAccessDiv.style.display = 'block';
                passwordAccessDiv.style.display = 'none';
            }
        }
        
        // Load link data
        async function loadLink() {
            if (!linkId) {
                showError('Invalid link. No content ID provided.', true);
                return;
            }
            
            if (!encodedUser) {
                showError('Invalid link. Missing user information.', true);
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            
            try {
                const path = `shareLinks/${encodedUser}/${linkId}`;
                linkData = await getData(path);
                
                if (!linkData) {
                    showError('Link not found or has been deleted.', true);
                    return;
                }
                
                console.log("Link loaded:", {
                    id: linkData.id,
                    title: linkData.title,
                    hasPassword: linkData.hasPassword,
                    views: linkData.views || 0
                });
                
                // Check expiration
                if (linkData.expiration) {
                    const expDate = new Date(linkData.expiration);
                    if (expDate < new Date()) {
                        showError('This link has expired.', true);
                        return;
                    }
                }
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('unlockSection').style.display = 'block';
                
                // Show appropriate access message
                showAccessMessage();
                
            } catch (err) {
                console.error('Load error:', err);
                showError(`Error loading content: ${err.message}`, true);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        // View open access content (no password)
        async function viewOpenContent() {
            document.getElementById('loading').style.display = 'block';
            
            try {
                await incrementViews();
                await displayContent();
            } catch (err) {
                console.error("View error:", err);
                showError(`Error: ${err.message}`);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        // Verify password and display content
        async function verifyAndUnlock() {
            const password = document.getElementById('passwordInput').value;
            
            if (!password) {
                showError('Please enter the password.');
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('unlockBtn').disabled = true;
            
            try {
                const enteredHash = await hashPassword(password);
                
                if (enteredHash === linkData.passwordHash) {
                    await incrementViews();
                    await displayContent();
                } else {
                    showError('Incorrect password. Please try again.');
                    document.getElementById('passwordInput').value = '';
                    document.getElementById('passwordInput').focus();
                }
            } catch (err) {
                console.error("Unlock error:", err);
                showError(`Error: ${err.message}`);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('unlockBtn').disabled = false;
            }
        }
        
        // Display the content
        async function displayContent() {
            try {
                let content = linkData.content || 'No content available.';
                let title = linkData.title || 'Untitled';
                
                // Create HTML display
                const contentDisplay = document.getElementById('contentDisplay');
                contentDisplay.innerHTML = `
                    <div class="content-display">
                        <div class="content-title">
                            📄 ${escapeHtml(title)}
                            ${linkData.hasPassword ? '<span class="security-badge badge-password">🔒 Password Protected</span>' : '<span class="security-badge badge-open">🔓 Open Access</span>'}
                        </div>
                        <div class="content-body">${escapeHtml(content).replace(/\n/g, '<br>')}</div>
                        ${linkData.expiration ? `
                            <div style="margin-top: 20px; padding-top: 10px; border-top: 1px solid #e2e8f0; font-size: 0.85rem; color: #64748b;">
                                ⏰ This link expires on: ${new Date(linkData.expiration).toLocaleString()}
                            </div>
                        ` : ''}
                        <div class="view-count">
                            👁️ Viewed ${linkData.views || 0} time${(linkData.views || 0) !== 1 ? 's' : ''}
                        </div>
                    </div>
                `;
                
                // Hide unlock section, show content
                document.getElementById('unlockSection').style.display = 'none';
                document.getElementById('contentSection').style.display = 'block';
                
                // Clear password from memory
                const passwordInput = document.getElementById('passwordInput');
                if (passwordInput) {
                    passwordInput.value = '';
                }
                
            } catch (err) {
                console.error("Display error:", err);
                showError(`Error displaying content: ${err.message}`);
            }
        }
        
        // Show error message
        function showError(message, isFatal = false) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            if (isFatal) {
                const unlockBtn = document.getElementById('unlockBtn');
                const viewOpenBtn = document.getElementById('viewOpenContentBtn');
                const passwordInput = document.getElementById('passwordInput');
                if (unlockBtn) unlockBtn.disabled = true;
                if (viewOpenBtn) viewOpenBtn.disabled = true;
                if (passwordInput) passwordInput.disabled = true;
            }
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        // Helper to escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Event listeners
        const unlockBtn = document.getElementById('unlockBtn');
        const passwordInput = document.getElementById('passwordInput');
        const viewOpenContentBtn = document.getElementById('viewOpenContentBtn');
        const backToUnlockBtn = document.getElementById('backToUnlockBtn');
        
        if (unlockBtn) {
            unlockBtn.addEventListener('click', verifyAndUnlock);
        }
        
        if (passwordInput) {
            passwordInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') verifyAndUnlock();
            });
        }
        
        if (viewOpenContentBtn) {
            viewOpenContentBtn.addEventListener('click', viewOpenContent);
        }
        
        if (backToUnlockBtn) {
            backToUnlockBtn.addEventListener('click', resetToUnlock);
        }
        
        // Initialize
        loadLink();
    </script>
</body>
</html>
