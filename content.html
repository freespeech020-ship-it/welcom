<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Content - PriBox Share</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .secure-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #219EBC 0%, #8ECAE6 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content-area {
            padding: 40px;
        }

        .lock-icon {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .password-form {
            max-width: 400px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #219EBC;
            box-shadow: 0 0 0 3px rgba(33, 158, 188, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #219EBC;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #1a7a94;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(33, 158, 188, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .content-display {
            background: #f8fafc;
            border-radius: 16px;
            padding: 30px;
            margin-top: 20px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .content-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }

        .content-body {
            line-height: 1.6;
            color: #334155;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }

        .loading {
            text-align: center;
            margin-top: 20px;
            display: none;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #219EBC;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            padding: 20px;
            text-align: center;
            background: #f8fafc;
            color: #64748b;
            font-size: 0.85rem;
            border-top: 1px solid #e2e8f0;
        }

        .security-badge {
            display: inline-block;
            background: #dbeafe;
            color: #1e40af;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-left: 10px;
        }

        .info-box {
            background: #dbeafe;
            border-left: 4px solid #219EBC;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #1e40af;
        }

        .warning-box {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #92400e;
        }

        .expired-badge {
            display: inline-block;
            background: #fee2e2;
            color: #dc2626;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-left: 10px;
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            .secure-card {
                background: #1e293b;
            }
            .content-display {
                background: #0f172a;
            }
            .content-title {
                color: #f1f5f9;
                border-bottom-color: #334155;
            }
            .content-body {
                color: #cbd5e1;
            }
            label {
                color: #f1f5f9;
            }
            .footer {
                background: #0f172a;
                color: #94a3b8;
                border-top-color: #334155;
            }
            .info-box {
                background: #1e293b;
                color: #93c5fd;
            }
            .warning-box {
                background: #422006;
                color: #fcd34d;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="secure-card">
            <div class="header">
                <h1>🔒 PriBox Secure Content</h1>
                <p>Zero-knowledge encryption • Your data stays private</p>
            </div>

            <div class="content-area">
                <div id="unlockSection">
                    <div class="lock-icon">🔐</div>
                    <div class="password-form">
                        <div class="form-group">
                            <label>Enter Password to Access</label>
                            <input type="password" id="passwordInput" placeholder="Content password" autocomplete="off">
                        </div>
                        <button id="unlockBtn">Unlock Content</button>
                        <div id="errorMessage" class="error-message"></div>
                    </div>
                </div>

                <div id="contentSection" style="display: none;">
                    <div id="contentDisplay">
                        <!-- Content will be shown here -->
                    </div>
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                </div>
            </div>

            <div class="footer">
                <span>🔒 End-to-end encrypted</span>
                <span class="security-badge">Powered by PriBox</span>
            </div>
        </div>
    </div>

    <script>
        // Firebase configuration
        const DB_URL = "https://admin-efcf4-default-rtdb.europe-west1.firebasedatabase.app";
        
        // Get parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const linkId = urlParams.get('id');
        const encodedUser = urlParams.get('user');
        
        let linkData = null;
        let decryptionKey = null;
        
        // Get encryption key from URL fragment (#key=...)
        const hash = window.location.hash.substring(1);
        if (hash && hash.startsWith('key=')) {
            decryptionKey = hash.substring(4);
            console.log("Encryption key found in URL fragment");
        }
        
        // Decode email from encoded format (reverse of encodeEmail)
        function decodeEmail(encodedEmail) {
            if (!encodedEmail) return null;
            return encodedEmail.replace(/-at-/g, '@').replace(/,/g, '.');
        }
        
        // SHA-256 hash function
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        // Simple XOR decryption (for demo purposes - in production use AES-GCM)
        function simpleDecrypt(encryptedText, key) {
            if (!encryptedText || !key) return encryptedText;
            try {
                let result = '';
                for (let i = 0; i < encryptedText.length; i++) {
                    const charCode = encryptedText.charCodeAt(i) ^ key.charCodeAt(i % key.length);
                    result += String.fromCharCode(charCode);
                }
                return result;
            } catch (e) {
                console.error("Decryption error:", e);
                return encryptedText;
            }
        }
        
        // Fetch data from Firebase (single-node structure)
        async function getData(path) {
            try {
                const response = await fetch(`${DB_URL}/${path}.json`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                console.log(`Fetched ${path}:`, data);
                return data;
            } catch (err) {
                console.error('Fetch error:', err);
                return null;
            }
        }
        
        // Update view count in the single-node structure
        async function incrementViews(encodedUser, linkId, currentViews) {
            try {
                const newViews = (currentViews || 0) + 1;
                const path = `shareLinks/${encodedUser}/${linkId}/views`;
                await fetch(`${DB_URL}/${path}.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newViews)
                });
                console.log(`View count updated: ${newViews}`);
                return newViews;
            } catch (err) {
                console.error("View increment error:", err);
                return currentViews;
            }
        }
        
        // Load link data from single-node structure
        async function loadLink() {
            if (!linkId) {
                showError('Invalid link. No content ID provided.', true);
                return;
            }
            
            if (!encodedUser) {
                showError('Invalid link. Missing user information.', true);
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            
            try {
                // Fetch from single-node structure: shareLinks/{user}/{linkId}
                const path = `shareLinks/${encodedUser}/${linkId}`;
                linkData = await getData(path);
                
                if (!linkData) {
                    showError('Link not found or has been deleted.', true);
                    return;
                }
                
                console.log("Link data loaded:", linkData);
                
                // Check expiration
                if (linkData.expiration) {
                    const expDate = new Date(linkData.expiration);
                    if (expDate < new Date()) {
                        showError('This link has expired.', true);
                        return;
                    }
                }
                
                // Decrypt content if encryption key is available
                if (decryptionKey && linkData.content) {
                    try {
                        // Attempt to decrypt content
                        const decryptedContent = simpleDecrypt(linkData.content, decryptionKey);
                        if (decryptedContent && decryptedContent !== linkData.content) {
                            linkData.content = decryptedContent;
                            console.log("Content decrypted successfully");
                        }
                    } catch (e) {
                        console.warn("Decryption failed, using original content:", e);
                    }
                }
                
                // Check if link requires password
                if (!linkData.hasPassword) {
                    // No password required, just show content
                    await displayContent();
                } else {
                    // Hide loading, show password form
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('unlockSection').style.display = 'block';
                }
                
            } catch (err) {
                console.error('Load error:', err);
                showError(`Error loading content: ${err.message}`, true);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        // Verify password and unlock content
        async function verifyAndUnlock() {
            const password = document.getElementById('passwordInput').value;
            
            if (!password) {
                showError('Please enter the password.');
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('unlockBtn').disabled = true;
            
            try {
                const enteredHash = await hashPassword(password);
                console.log("Verifying password...");
                
                if (enteredHash === linkData.passwordHash) {
                    await displayContent();
                } else {
                    showError('Incorrect password. Please try again.');
                    document.getElementById('passwordInput').value = '';
                    document.getElementById('passwordInput').focus();
                }
            } catch (err) {
                console.error("Unlock error:", err);
                showError(`Error: ${err.message}`);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('unlockBtn').disabled = false;
            }
        }
        
        // Display the content
        async function displayContent() {
            try {
                // Increment view counter in single-node structure
                await incrementViews(encodedUser, linkId, linkData.views);
                
                let content = linkData.content || 'No content available.';
                let title = linkData.title || 'Untitled';
                
                // Create HTML display
                const contentDisplay = document.getElementById('contentDisplay');
                contentDisplay.innerHTML = `
                    <div class="content-display">
                        <div class="content-title">
                            📄 ${escapeHtml(title)}
                            ${linkData.hasPassword ? '<span class="security-badge" style="background:#e0e7ff;">🔒 Password Protected</span>' : '<span class="security-badge" style="background:#dcfce7;">🔓 Open Access</span>'}
                        </div>
                        <div class="content-body">${escapeHtml(content).replace(/\n/g, '<br>')}</div>
                        ${linkData.expiration ? `
                            <div style="margin-top: 20px; padding-top: 10px; border-top: 1px solid #e2e8f0; font-size: 0.85rem; color: #64748b;">
                                ⏰ This link expires on: ${new Date(linkData.expiration).toLocaleString()}
                            </div>
                        ` : ''}
                        <div style="margin-top: 15px; font-size: 0.75rem; color: #94a3b8; text-align: center;">
                            Viewed ${(linkData.views || 0) + 1} times
                        </div>
                    </div>
                `;
                
                // Hide unlock section, show content
                document.getElementById('unlockSection').style.display = 'none';
                document.getElementById('contentSection').style.display = 'block';
                
                // Clear password from memory
                const passwordInput = document.getElementById('passwordInput');
                if (passwordInput) {
                    passwordInput.value = '';
                }
                
            } catch (err) {
                console.error("Display error:", err);
                showError(`Error displaying content: ${err.message}`);
            }
        }
        
        // Show error message
        function showError(message, isFatal = false) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            if (isFatal) {
                const unlockBtn = document.getElementById('unlockBtn');
                const passwordInput = document.getElementById('passwordInput');
                if (unlockBtn) unlockBtn.disabled = true;
                if (passwordInput) passwordInput.disabled = true;
            }
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        // Helper to escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Event listeners
        const unlockBtn = document.getElementById('unlockBtn');
        const passwordInput = document.getElementById('passwordInput');
        
        if (unlockBtn) {
            unlockBtn.addEventListener('click', verifyAndUnlock);
        }
        
        if (passwordInput) {
            passwordInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') verifyAndUnlock();
            });
        }
        
        // Initialize
        loadLink();
        
        // Show warning if no encryption key in URL for encrypted content
        if (!decryptionKey && window.location.hash === '') {
            console.log("No encryption key found in URL fragment");
            // Add warning banner if content might be encrypted
            setTimeout(() => {
                if (linkData && linkData.content && linkData.content.length > 0) {
                    const warningHtml = `
                        <div class="warning-box" id="keyWarning" style="margin-top: 15px;">
                            ⚠️ <strong>Note:</strong> This content may be encrypted. Make sure the URL contains the complete encryption key.
                        </div>
                    `;
                    const unlockSection = document.getElementById('unlockSection');
                    if (unlockSection && !document.getElementById('keyWarning')) {
                        unlockSection.insertAdjacentHTML('beforeend', warningHtml);
                        setTimeout(() => {
                            const warning = document.getElementById('keyWarning');
                            if (warning) warning.style.display = 'none';
                        }, 8000);
                    }
                }
            }, 1000);
        }
        
        // Clean up sensitive data from memory when page is unloaded
        window.addEventListener('beforeunload', () => {
            linkData = null;
            decryptionKey = null;
            if (passwordInput) passwordInput.value = '';
        });
    </script>
</body>
</html>
