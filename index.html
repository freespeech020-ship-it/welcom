<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Content Vault - Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            animation: fadeInDown 0.8s ease-out;
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.95;
            max-width: 600px;
            margin: 0 auto;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Content Grid */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }

        .content-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            animation: fadeIn 0.6s ease-out;
        }

        .content-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
        }

        .card-header h3 {
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        .card-header .hint {
            font-size: 0.85rem;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-body {
            padding: 25px;
        }

        .password-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 12px;
            transition: all 0.3s;
        }

        .password-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .unlock-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .unlock-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.3);
        }

        .content-display {
            margin-top: 15px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 12px;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        .content-display.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 8px;
            display: none;
        }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            background: rgba(0,0,0,0.1);
            color: white;
            margin-top: 40px;
        }

        .admin-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 12px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 1000;
        }

        .admin-link:hover {
            background: rgba(0,0,0,0.9);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }
            .content-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>🔐 Secure Content Vault</h1>
        <p>Protected content with individual passwords • Zero-knowledge encryption</p>
    </div>

    <div class="container">
        <div class="content-grid" id="contentGrid">
            <div style="text-align: center; color: white; grid-column: 1/-1; padding: 40px;">
                <div class="loading" style="width: 40px; height: 40px; border-width: 3px;"></div>
                <p style="margin-top: 15px;">Loading available content...</p>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>🔒 End-to-end encrypted • Your privacy matters</p>
    </div>

    <a href="admin.html" class="admin-link">🔑 Admin Access</a>

    <script>
        // Firebase configuration
        const DB_URL = "https://admin-efcf4-default-rtdb.europe-west1.firebasedatabase.app";
        
        // SHA-256 hash function
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        // Fetch data from Firebase
        async function getData(path) {
            try {
                const response = await fetch(`${DB_URL}/${path}.json`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (err) {
                console.error('Fetch error:', err);
                return null;
            }
        }
        
        // Get all content items
        async function getAllContentItems() {
            const data = await getData('contents');
            if (!data) return {};
            return data;
        }
        
        // Verify password for specific content
        async function verifyContentPassword(contentId, enteredPassword) {
            const contentData = await getData(`contents/${contentId}`);
            if (!contentData || !contentData.passwordHash) {
                throw new Error("Content not found");
            }
            
            const enteredHash = await hashPassword(enteredPassword);
            if (enteredHash !== contentData.passwordHash) {
                throw new Error("Incorrect password");
            }
            
            return contentData.content || "(No content available)";
        }
        
        // Render all content cards
        async function renderContentCards() {
            const grid = document.getElementById('contentGrid');
            
            try {
                const contents = await getAllContentItems();
                const contentIds = Object.keys(contents);
                
                if (contentIds.length === 0) {
                    grid.innerHTML = `
                        <div style="text-align: center; color: white; grid-column: 1/-1; padding: 40px;">
                            <h3>📭 No content available yet</h3>
                            <p style="margin-top: 10px;">Check back later for shared content.</p>
                        </div>
                    `;
                    return;
                }
                
                grid.innerHTML = '';
                
                for (const id of contentIds) {
                    const item = contents[id];
                    const card = createCard(id, item.title || 'Untitled', item.hint || 'Enter password to unlock');
                    grid.appendChild(card);
                }
            } catch (err) {
                console.error('Error loading contents:', err);
                grid.innerHTML = `
                    <div style="text-align: center; color: white; grid-column: 1/-1; padding: 40px;">
                        <h3>⚠️ Error loading content</h3>
                        <p style="margin-top: 10px;">Please try again later.</p>
                    </div>
                `;
            }
        }
        
        // Create HTML card for a content item
        function createCard(id, title, hint) {
            const card = document.createElement('div');
            card.className = 'content-card';
            card.innerHTML = `
                <div class="card-header">
                    <h3>📄 ${escapeHtml(title)}</h3>
                    <div class="hint">💡 ${escapeHtml(hint)}</div>
                </div>
                <div class="card-body">
                    <input type="password" class="password-input" placeholder="Enter password" data-id="${id}">
                    <button class="unlock-btn" data-id="${id}">🔓 Unlock Content</button>
                    <div class="error-msg" data-id="${id}"></div>
                    <div class="content-display" data-id="${id}"></div>
                </div>
            `;
            
            // Add event listeners
            const unlockBtn = card.querySelector('.unlock-btn');
            const passwordInput = card.querySelector('.password-input');
            
            unlockBtn.addEventListener('click', () => handleUnlock(id, card));
            passwordInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleUnlock(id, card);
            });
            
            return card;
        }
        
        // Handle unlock attempt
        async function handleUnlock(contentId, cardElement) {
            const passwordInput = cardElement.querySelector('.password-input');
            const errorDiv = cardElement.querySelector('.error-msg');
            const contentDisplay = cardElement.querySelector('.content-display');
            const unlockBtn = cardElement.querySelector('.unlock-btn');
            
            const password = passwordInput.value.trim();
            
            // Clear previous
            errorDiv.style.display = 'none';
            errorDiv.innerHTML = '';
            contentDisplay.classList.remove('show');
            contentDisplay.innerHTML = '';
            
            if (!password) {
                errorDiv.innerHTML = '⚠️ Please enter a password';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Show loading
            const originalBtnText = unlockBtn.innerHTML;
            unlockBtn.innerHTML = 'Unlocking... <span class="loading"></span>';
            unlockBtn.disabled = true;
            
            try {
                const content = await verifyContentPassword(contentId, password);
                contentDisplay.innerHTML = `<strong>📄 Content:</strong><br>${escapeHtml(content).replace(/\n/g, '<br>')}`;
                contentDisplay.classList.add('show');
                passwordInput.value = ''; // Clear password for security
                errorDiv.style.display = 'none';
            } catch (err) {
                errorDiv.innerHTML = `❌ ${err.message}`;
                errorDiv.style.display = 'block';
                passwordInput.value = '';
                passwordInput.focus();
            } finally {
                unlockBtn.innerHTML = originalBtnText;
                unlockBtn.disabled = false;
            }
        }
        
        // Helper to escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Load all content on page load
        renderContentCards();
        
        // Auto-refresh every 30 seconds
        setInterval(renderContentCards, 30000);
    </script>
</body>
</html>
