<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Content - Proton Drive Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .secure-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content-area {
            padding: 40px;
        }

        .lock-icon {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .password-form {
            max-width: 400px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59,130,246,0.3);
        }

        .content-display {
            background: #f8fafc;
            border-radius: 16px;
            padding: 30px;
            margin-top: 20px;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .content-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }

        .content-body {
            line-height: 1.6;
            color: #334155;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }

        .loading {
            text-align: center;
            margin-top: 20px;
            display: none;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            padding: 20px;
            text-align: center;
            background: #f8fafc;
            color: #64748b;
            font-size: 0.85rem;
        }

        .security-badge {
            display: inline-block;
            background: #dbeafe;
            color: #1e40af;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="secure-card">
            <div class="header">
                <h1>🔒 Secure Content</h1>
                <p>Zero-knowledge encryption • Your data is private</p>
            </div>

            <div class="content-area">
                <div id="unlockSection">
                    <div class="lock-icon">🔐</div>
                    <div class="password-form">
                        <div class="form-group">
                            <label>Enter Password to Access</label>
                            <input type="password" id="passwordInput" placeholder="Content password" autocomplete="off">
                        </div>
                        <button id="unlockBtn">Unlock Content</button>
                        <div id="errorMessage" class="error-message"></div>
                    </div>
                </div>

                <div id="contentSection" style="display: none;">
                    <div class="content-display" id="contentDisplay">
                        <div class="content-title" id="contentTitle"></div>
                        <div class="content-body" id="contentBody"></div>
                    </div>
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                </div>
            </div>

            <div class="footer">
                <span>🔒 End-to-end encrypted</span>
                <span class="security-badge">Proton Drive Style</span>
            </div>
        </div>
    </div>

    <script>
        const DB_URL = "https://admin-efcf4-default-rtdb.europe-west1.firebasedatabase.app";
        
        // Get link ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const linkId = urlParams.get('id');
        const urlKey = window.location.hash.substring(1).split('=')[1];
        
        let linkData = null;
        
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        async function getData(path) {
            const response = await fetch(`${DB_URL}/${path}.json`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.json();
        }
        
        async function incrementViews(linkId) {
            const link = await getData(`secureLinks/${linkId}`);
            if (link) {
                const views = (link.views || 0) + 1;
                await fetch(`${DB_URL}/secureLinks/${linkId}/views.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(views)
                });
            }
        }
        
        async function loadLink() {
            if (!linkId) {
                showError('Invalid link. No content ID provided.');
                return;
            }
            
            try {
                linkData = await getData(`secureLinks/${linkId}`);
                
                if (!linkData) {
                    showError('Link not found or has been deleted.');
                    return;
                }
                
                // Check expiration
                if (linkData.expiration) {
                    const expDate = new Date(linkData.expiration);
                    if (expDate < new Date()) {
                        showError('This link has expired.');
                        return;
                    }
                }
                
                // Check if link requires password
                if (!linkData.hasPassword) {
                    // No password required, just show content
                    await displayContent();
                }
                // Otherwise, wait for password input
                
            } catch (err) {
                showError(`Error loading content: ${err.message}`);
            }
        }
        
        async function verifyAndUnlock() {
            const password = document.getElementById('passwordInput').value;
            
            if (!password) {
                showError('Please enter the password.');
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('unlockBtn').disabled = true;
            
            try {
                const enteredHash = await hashPassword(password);
                
                if (enteredHash === linkData.passwordHash) {
                    await displayContent();
                } else {
                    showError('Incorrect password. Please try again.');
                    document.getElementById('passwordInput').value = '';
                    document.getElementById('passwordInput').focus();
                }
            } catch (err) {
                showError(`Error: ${err.message}`);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('unlockBtn').disabled = false;
            }
        }
        
        async function displayContent() {
            // Increment view counter
            await incrementViews(linkId);
            
            // Display content
            document.getElementById('contentTitle').textContent = linkData.title;
            document.getElementById('contentBody').innerHTML = linkData.content.replace(/\n/g, '<br>');
            
            document.getElementById('unlockSection').style.display = 'none';
            document.getElementById('contentSection').style.display = 'block';
            
            // Clear password from memory
            document.getElementById('passwordInput').value = '';
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        // Event listeners
        document.getElementById('unlockBtn').addEventListener('click', verifyAndUnlock);
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyAndUnlock();
        });
        
        // Initialize
        loadLink();
    </script>
</body>
</html>
